<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>ElChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d0d0f;
      --surface:  #161618;
      --elevated: #1e1e22;
      --border:   rgba(255,255,255,0.08);
      --text:     #f0f0f4;
      --sub:      #9494a8;
      --muted:    #5a5a6e;
      --purple:   #7C6FFF;
      --pink:     #FF6B9D;
      --green:    #66BB6A;
      --red:      #EF5350;
      --grad:     linear-gradient(135deg, #7C6FFF, #FF6B9D);
      --nav-h:    64px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; height: 100dvh; }
    .screen.active { display: flex; }

    /* ══════════════════════
       AUTH SCREEN
    ══════════════════════ */
    #auth-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }
    .auth-card {
      background: #1e1e22;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-logo p { color: var(--sub); font-size: 13px; margin-top: 4px; }
    .tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; border: none; background: none; color: var(--sub); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 9px; transition: all 0.2s; }
    .tab.active { background: var(--elevated); color: var(--text); }
    .panel { display: none; flex-direction: column; gap: 14px; }
    .panel.active { display: flex; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    input[type=email], input[type=text], input[type=password] {
      width: 100%; padding: 12px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--purple); }
    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: var(--grad); color: white;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { display: none; text-align: center; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 4px; }
    .msg.error   { display: block; background: rgba(239,83,80,0.12);  color: var(--red); }
    .msg.success { display: block; background: rgba(102,187,106,0.12); color: var(--green); }
    .msg.info    { display: block; background: rgba(124,111,255,0.12); color: var(--purple); }

    /* ══════════════════════
       APP SCREEN
    ══════════════════════ */
    #app-screen { background: var(--bg); }

    /* Header */
    .app-header {
      height: 60px; background: rgba(13,13,15,0.95);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; flex-shrink: 0;
    }
    .app-header__left { display: flex; align-items: center; gap: 10px; }
    .app-header__title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .app-header__title.gradient { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: white;
      cursor: pointer; overflow: hidden; flex-shrink: 0;
      border: 2px solid rgba(124,111,255,0.3);
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .btn-icon { width: 36px; height: 36px; background: none; border: none; color: var(--sub); cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .btn-icon:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .btn-icon svg { width: 20px; height: 20px; }

    /* Content */
    .app-content { flex: 1; overflow: hidden; position: relative; }
    .page { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
    .page.active { display: flex; }

    /* Bottom Nav */
    .bottom-nav {
      height: var(--nav-h); background: rgba(16,16,18,0.97);
      backdrop-filter: blur(24px); border-top: 1px solid var(--border);
      display: flex; flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; background: none; border: none;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 10.5px; font-weight: 500; cursor: pointer;
      transition: color 0.2s; -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .nav-btn svg { width: 23px; height: 23px; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .nav-btn.active { color: var(--purple); }
    .nav-btn.active svg { transform: scale(1.15); }
    .nav-btn.active::after {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 28px; height: 2px; background: var(--grad);
      border-radius: 0 0 4px 4px;
    }

    /* ── CHAT PAGE ── */
    .chat-list { display: flex; flex-direction: column; }
    .chat-item {
      display: flex; align-items: center; gap: 13px;
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .chat-item:active { background: rgba(255,255,255,0.04); }
    .chat-avatar {
      width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: white;
      overflow: hidden;
    }
    .chat-avatar.global { background: var(--grad); box-shadow: 0 0 0 2px rgba(124,111,255,0.3); }
    .chat-avatar.g1 { background: linear-gradient(135deg,#7C6FFF,#FF6B9D); }
    .chat-avatar.g2 { background: linear-gradient(135deg,#4FC3F7,#7C6FFF); }
    .chat-avatar.g3 { background: linear-gradient(135deg,#66BB6A,#4FC3F7); }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-last { font-size: 13px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .chat-time { font-size: 11px; color: var(--muted); }
    .chat-badge { background: var(--grad); color: white; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; padding: 0 5px; display: flex; align-items: center; justify-content: center; }
    .global-pill { background: rgba(124,111,255,0.12); border: 1px solid rgba(124,111,255,0.3); color: var(--purple); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
    .section-label { padding: 10px 16px 4px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; text-align: center; gap: 10px; }
    .empty-state svg { width: 56px; height: 56px; color: var(--muted); opacity: 0.4; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .empty-state p { font-size: 13.5px; color: var(--sub); line-height: 1.6; max-width: 240px; }
    .loading-dots { display: flex; gap: 6px; justify-content: center; padding: 32px; }
    .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: dot 1.4s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* Placeholder pages */
    .page-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 32px; text-align: center; gap: 12px; }
    .page-placeholder svg { width: 48px; height: 48px; color: var(--muted); opacity: 0.35; }
    .page-placeholder h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .page-placeholder p { font-size: 13.5px; color: var(--sub); max-width: 220px; line-height: 1.6; }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--elevated); border: 1px solid var(--border);
      color: var(--text); font-size: 13.5px; font-weight: 500;
      padding: 10px 18px; border-radius: 100px;
      opacity: 0; pointer-events: none;
      transition: all 0.3s; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(102,187,106,0.4); color: var(--green); }
    .toast.error   { border-color: rgba(239,83,80,0.4);   color: var(--red); }
  </style>
</head>
<body>

  <!-- ════════════════ AUTH ════════════════ -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>ElChat</h1>
        <p>Encrypted. Personal. Yours.</p>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Masuk</button>
        <button class="tab"        onclick="switchTab('register')">Daftar</button>
      </div>

      <!-- Login -->
      <div class="panel active" id="panel-login">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="nama@email.com" /></div>
        <div class="field"><label>Kata Sandi</label><input type="password" id="login-password" placeholder="••••••••" /></div>
        <div class="msg" id="login-msg"></div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Masuk</button>
      </div>

      <!-- Register -->
      <div class="panel" id="panel-register">
        <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="nama@email.com" /></div>
        <div class="field"><label>Username</label><input type="text" id="reg-username" placeholder="username17" /></div>
        <div class="field"><label>Kata Sandi (min 7 karakter + angka)</label><input type="password" id="reg-password" placeholder="••••••••" /></div>
        <div class="msg" id="reg-msg"></div>
        <button class="btn-primary" id="btn-register" onclick="doRegister()">Buat Akun</button>
      </div>
    </div>
  </div>

  <!-- ════════════════ APP ════════════════ -->
  <div id="app-screen" class="screen">

    <header class="app-header">
      <div class="app-header__left">
        <span class="app-header__title gradient" id="page-title">ElChat</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="user-avatar" id="user-avatar"></div>
        <button class="btn-icon" onclick="doLogout()" title="Keluar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </header>

    <div class="app-content">

      <!-- CHAT PAGE -->
      <div class="page active" id="page-chat">
        <div id="chat-list-container">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- CALLS PAGE -->
      <div class="page" id="page-calls">
        <div class="page-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18a2 2 0 012-2.18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 6.83a16 16 0 006.29 6.29l1.12-1.12a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.72 2z"/></svg>
          <h2>Panggilan</h2>
          <p>Fitur panggilan suara dan video akan segera hadir.</p>
        </div>
      </div>

      <!-- STORIES PAGE -->
      <div class="page" id="page-stories">
        <div class="page-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
          <h2>Cerita</h2>
          <p>Bagikan momen harianmu. Cerita hilang otomatis setelah 24 jam.</p>
        </div>
      </div>

    </div>

    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-chat" onclick="goTo('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Chat
      </button>
      <button class="nav-btn" id="nav-calls" onclick="goTo('calls')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18a2 2 0 012-2.18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 6.83a16 16 0 006.29 6.29l1.12-1.12a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.72 2z"/></svg>
        Panggilan
      </button>
      <button class="nav-btn" id="nav-stories" onclick="goTo('stories')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
        Cerita
      </button>
    </nav>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script>
  var SUPABASE_URL  = 'https://sxdegbjhumiurcrfcanh.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4ZGVnYmpodW1pdXJjcmZjYW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTY1OTQsImV4cCI6MjA4OTQ5MjU5NH0.491zxrUqtwlKPFN2mXo5apduQ0lNptwrc8dXBlILTEQ';

  var db;
  var currentUser   = null;
  var currentProfile = null;

  // ── INIT ──
  window.addEventListener('load', async function() {
    try {
      if (typeof supabase === 'undefined') throw new Error('Supabase CDN gagal dimuat');
      db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      var s = await db.auth.getSession();
      if (s.data && s.data.session) {
        currentUser = s.data.session.user;
        await loadProfile();
        showApp();
      } else {
        showAuth();
      }

      db.auth.onAuthStateChange(async function(event, session) {
        if (event === 'SIGNED_IN' && session) {
          currentUser = session.user;
          await loadProfile();
          showApp();
        } else if (event === 'SIGNED_OUT') {
          currentUser = null; currentProfile = null;
          showAuth();
        }
      });
    } catch(e) {
      showAuth();
      showToast('Gagal terhubung ke server: ' + e.message, 'error');
    }
  });

  // ── PROFILE ──
  async function loadProfile() {
    try {
      var r = await db.from('profiles').select('*').eq('id', currentUser.id).single();
      if (r.data) {
        currentProfile = r.data;
      } else {
        var uname = 'user_' + currentUser.id.substring(0,6);
        await db.from('profiles').insert([{ id: currentUser.id, username: uname, email: currentUser.email, role: 'user' }]);
        currentProfile = { id: currentUser.id, username: uname, email: currentUser.email, role: 'user' };
      }
    } catch(e) {
      currentProfile = { id: currentUser.id, email: currentUser.email, username: 'user', role: 'user' };
    }
  }

  // ── SCREENS ──
  function showAuth() {
    document.getElementById('auth-screen').classList.add('active');
    document.getElementById('app-screen').classList.remove('active');
  }
  function showApp() {
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('app-screen').classList.add('active');

    // Set avatar
    var av = document.getElementById('user-avatar');
    var initials = (currentProfile && currentProfile.username ? currentProfile.username : (currentUser.email || 'U')).substring(0,2).toUpperCase();
    if (currentProfile && currentProfile.avatar_url) {
      av.innerHTML = '<img src="' + currentProfile.avatar_url + '" alt="avatar" />';
    } else {
      av.textContent = initials;
    }

    loadChatList();
  }

  // ── AUTH TABS ──
  function switchTab(tab) {
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.querySelectorAll('.tab').forEach(function(t, i) {
      t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
    });
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (type || '');
  }

  // ── LOGIN ──
  async function doLogin() {
    var email    = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    if (!email || !password) { showMsg('login-msg','Email dan kata sandi wajib diisi.','error'); return; }

    document.getElementById('btn-login').disabled = true;
    showMsg('login-msg','Memproses...','info');

    try {
      var r = await db.auth.signInWithPassword({ email: email, password: password });
      if (r.error) throw r.error;
      showMsg('login-msg','✅ Login berhasil!','success');
    } catch(e) {
      showMsg('login-msg','❌ ' + mapError(e.message),'error');
      document.getElementById('btn-login').disabled = false;
    }
  }

  // ── REGISTER ──
  async function doRegister() {
    var email    = document.getElementById('reg-email').value.trim();
    var username = document.getElementById('reg-username').value.trim().toLowerCase();
    var password = document.getElementById('reg-password').value;

    if (!email || !username || !password) { showMsg('reg-msg','Semua kolom wajib diisi.','error'); return; }
    if (password.length < 7)              { showMsg('reg-msg','Kata sandi minimal 7 karakter.','error'); return; }
    if (!/\d/.test(password))             { showMsg('reg-msg','Kata sandi harus mengandung angka.','error'); return; }
    if (!/^[a-zA-Z0-9._-]+$/.test(username)) { showMsg('reg-msg','Username hanya boleh huruf, angka, titik, atau underscore.','error'); return; }

    document.getElementById('btn-register').disabled = true;
    showMsg('reg-msg','Membuat akun...','info');

    try {
      var r = await db.auth.signUp({ email: email, password: password, options: { data: { username: username } } });
      if (r.error) throw r.error;

      var userId = r.data.user.id;
      var pr = await db.from('profiles').insert([{ id: userId, username: username, email: email, role: 'user' }]);
      if (pr.error && pr.error.code !== '23505') throw pr.error;

      showMsg('reg-msg','✅ Akun berhasil dibuat! Silakan login.','success');
      setTimeout(function() {
        switchTab('login');
        document.getElementById('login-email').value = email;
        document.getElementById('btn-register').disabled = false;
        showMsg('reg-msg','','');
      }, 2000);
    } catch(e) {
      showMsg('reg-msg','❌ ' + mapError(e.message),'error');
      document.getElementById('btn-register').disabled = false;
    }
  }

  // ── LOGOUT ──
  async function doLogout() {
    await db.auth.signOut();
    showToast('Berhasil keluar.','success');
  }

  // ── NAVIGATION ──
  function goTo(page) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('nav-' + page).classList.add('active');

    var titles = { chat: 'ElChat', calls: 'Panggilan', stories: 'Cerita' };
    var el = document.getElementById('page-title');
    if (page === 'chat') {
      el.textContent = 'ElChat'; el.className = 'app-header__title gradient';
    } else {
      el.textContent = titles[page]; el.className = 'app-header__title';
    }
  }

  // ── CHAT LIST ──
  async function loadChatList() {
    var container = document.getElementById('chat-list-container');
    container.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

    try {
      // Load Global Room
      var gr = await db.from('rooms').select('id,name,last_message,last_message_at').eq('is_global', true).limit(1).maybeSingle();

      // Load user's DM rooms
      var mr = await db.from('room_members')
        .select('room_id, rooms(id,name,last_message,last_message_at,is_global,is_group)')
        .eq('user_id', currentUser.id)
        .order('rooms(last_message_at)', { ascending: false, nullsFirst: false });

      var html = '';

      // Global room
      if (gr.data) {
        html += '<div class="section-label">Global</div>';
        html += '<div class="chat-item" onclick="openRoom(\'' + gr.data.id + '\',\'' + esc(gr.data.name) + '\')">' +
          '<div class="chat-avatar global">GG</div>' +
          '<div class="chat-info">' +
            '<div class="chat-name">' + esc(gr.data.name) + '</div>' +
            '<div class="chat-last">' + esc(gr.data.last_message || 'Belum ada pesan') + '</div>' +
          '</div>' +
          '<div class="chat-meta"><div class="chat-time">' + fmtTime(gr.data.last_message_at) + '</div>' +
          '<div class="global-pill">Global</div></div>' +
        '</div>';
      }

      // Personal rooms
      var rooms = (mr.data || []).filter(function(m) { return m.rooms && !m.rooms.is_global; });
      if (rooms.length > 0) {
        html += '<div class="section-label">Percakapan</div>';
        var gradients = ['g1','g2','g3'];
        rooms.forEach(function(m, i) {
          var r = m.rooms;
          var initials = (r.name || 'R').substring(0,2).toUpperCase();
          html += '<div class="chat-item" onclick="openRoom(\'' + r.id + '\',\'' + esc(r.name) + '\')">' +
            '<div class="chat-avatar ' + gradients[i % 3] + '">' + initials + '</div>' +
            '<div class="chat-info">' +
              '<div class="chat-name">' + esc(r.name) + '</div>' +
              '<div class="chat-last">' + esc(r.last_message || 'Belum ada pesan') + '</div>' +
            '</div>' +
            '<div class="chat-meta"><div class="chat-time">' + fmtTime(r.last_message_at) + '</div></div>' +
          '</div>';
        });
      }

      if (!gr.data && rooms.length === 0) {
        html = '<div class="empty-state">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' +
          '<h3>Belum ada percakapan</h3>' +
          '<p>Cari pengguna lain untuk memulai percakapan.</p>' +
        '</div>';
      }

      container.innerHTML = '<div class="chat-list">' + html + '</div>';

    } catch(e) {
      container.innerHTML = '<div class="empty-state"><h3>Gagal memuat</h3><p>' + e.message + '</p></div>';
    }
  }

  function openRoom(roomId, roomName) {
    showToast('Membuka ' + roomName + '...', '');
    // Fitur ruang chat akan ditambahkan pada update berikutnya
  }

  // ── UTILITIES ──
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    clearTimeout(window._tt);
    window._tt = setTimeout(function() { t.className = 'toast'; }, 3000);
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso), now = new Date();
    var diff = (now - d) / 1000;
    if (diff < 60)   return 'Baru';
    if (diff < 3600) return Math.floor(diff/60) + ' mnt';
    if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('id-ID',{day:'numeric',month:'numeric'});
  }

  function mapError(msg) {
    if (!msg) return 'Terjadi kesalahan.';
    var m = msg.toLowerCase();
    if (m.includes('invalid login') || m.includes('invalid email')) return 'Email atau kata sandi tidak sesuai.';
    if (m.includes('email not confirmed')) return 'Email belum diverifikasi.';
    if (m.includes('already registered') || m.includes('already been registered')) return 'Email sudah terdaftar. Silakan login.';
    if (m.includes('rate limit')) return 'Terlalu banyak percobaan. Tunggu sebentar.';
    return msg;
  }
  </script>
