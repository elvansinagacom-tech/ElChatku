<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>ElChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #161618; --elevated: #1e1e22;
      --border: rgba(255,255,255,0.08); --text: #f0f0f4; --sub: #9494a8; --muted: #5a5a6e;
      --purple: #7C6FFF; --pink: #FF6B9D; --green: #66BB6A; --red: #EF5350; --blue: #4FC3F7;
      --grad: linear-gradient(135deg, #7C6FFF, #FF6B9D);
      --nav-h: 64px; --hdr-h: 60px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .screen { display: none; flex-direction: column; height: 100dvh; }
    .screen.active { display: flex; }

    /* ══ AUTH ══ */
    #auth-screen { align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
    .auth-card { background: var(--elevated); border: 1px solid var(--border); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 400px; }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .auth-logo p { color: var(--sub); font-size: 13px; margin-top: 4px; }
    .tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; border: none; background: none; color: var(--sub); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 9px; transition: all 0.2s; }
    .tab.active { background: var(--elevated); color: var(--text); }
    .panel { display: none; flex-direction: column; gap: 14px; }
    .panel.active { display: flex; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    input[type=email], input[type=text], input[type=password] { width: 100%; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; -webkit-appearance: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--purple); }
    .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--grad); color: white; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { display: none; text-align: center; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 4px; }
    .msg.error   { display: block; background: rgba(239,83,80,0.12);  color: var(--red); }
    .msg.success { display: block; background: rgba(102,187,106,0.12); color: var(--green); }
    .msg.info    { display: block; background: rgba(124,111,255,0.12); color: var(--purple); }

    /* ══ APP ══ */
    .app-header { height: var(--hdr-h); background: rgba(13,13,15,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
    .hdr-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .hdr-title.gradient { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hdr-actions { display: flex; align-items: center; gap: 6px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: white; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(124,111,255,0.3); cursor: pointer; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .btn-icon { width: 36px; height: 36px; background: none; border: none; color: var(--sub); cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .btn-icon svg { width: 20px; height: 20px; }
    .btn-icon:active { background: rgba(255,255,255,0.06); }
    .app-content { flex: 1; overflow: hidden; position: relative; }
    .page { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
    .page.active { display: flex; }
    .bottom-nav { height: var(--nav-h); background: rgba(16,16,18,0.97); backdrop-filter: blur(24px); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom,0px); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 10.5px; font-weight: 500; cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; }
    .nav-btn svg { width: 23px; height: 23px; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .nav-btn.active { color: var(--purple); }
    .nav-btn.active svg { transform: scale(1.15); }
    .nav-btn.active::after { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 28px; height: 2px; background: var(--grad); border-radius: 0 0 4px 4px; }

    /* ══ CHAT LIST ══ */
    .chat-item { display: flex; align-items: center; gap: 13px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); -webkit-tap-highlight-color: transparent; }
    .chat-item:active { background: rgba(255,255,255,0.04); }
    .chat-avatar { width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: white; overflow: hidden; }
    .chat-avatar.global { background: var(--grad); box-shadow: 0 0 0 2px rgba(124,111,255,0.3); }
    .chat-avatar.g1 { background: linear-gradient(135deg,#7C6FFF,#FF6B9D); }
    .chat-avatar.g2 { background: linear-gradient(135deg,#4FC3F7,#7C6FFF); }
    .chat-avatar.g3 { background: linear-gradient(135deg,#66BB6A,#4FC3F7); }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-last { font-size: 13px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .chat-time { font-size: 11px; color: var(--muted); }
    .chat-badge { background: var(--grad); color: white; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; padding: 0 5px; display: flex; align-items: center; justify-content: center; }
    .global-pill { background: rgba(124,111,255,0.12); border: 1px solid rgba(124,111,255,0.3); color: var(--purple); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; }
    .section-label { padding: 10px 16px 4px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; text-align: center; gap: 10px; }
    .empty-state svg { width: 56px; height: 56px; color: var(--muted); opacity: 0.4; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .empty-state p { font-size: 13.5px; color: var(--sub); line-height: 1.6; max-width: 240px; }
    .loading-dots { display: flex; gap: 6px; justify-content: center; padding: 32px; }
    .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: dot 1.4s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
    .page-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 32px; text-align: center; gap: 12px; }
    .page-placeholder svg { width: 48px; height: 48px; color: var(--muted); opacity: 0.35; }
    .page-placeholder h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .page-placeholder p { font-size: 13.5px; color: var(--sub); max-width: 220px; line-height: 1.6; }

    /* ══ ROOM SCREEN ══ */
    #room-screen {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      height: 100dvh;
    }
    #room-screen.open { transform: translateX(0); }

    /* Room Header */
    .room-header { height: var(--hdr-h); background: rgba(13,13,15,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px 0 6px; gap: 8px; flex-shrink: 0; }
    .room-header__info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .room-header__avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: white; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(124,111,255,0.25); }
    .room-header__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .room-header__name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-header__status { font-size: 12px; color: var(--muted); }
    .room-header__status.online { color: var(--green); }
    .room-header__status.typing { color: var(--purple); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Messages */
    .messages-area { flex: 1; overflow-y: auto; padding: 12px 12px 8px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
    .messages-area::-webkit-scrollbar { width: 3px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--elevated); border-radius: 10px; }

    .date-sep { text-align: center; padding: 10px 0 6px; }
    .date-sep span { background: var(--elevated); border: 1px solid var(--border); border-radius: 100px; padding: 3px 12px; font-size: 11.5px; color: var(--muted); }

    .msg-row { display: flex; align-items: flex-end; gap: 7px; margin-bottom: 2px; }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.theirs { justify-content: flex-start; }

    .msg-av { width: 28px; height: 28px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; align-self: flex-end; margin-bottom: 2px; }
    .msg-av img { width: 100%; height: 100%; object-fit: cover; }
    .msg-av.hidden { visibility: hidden; }

    .msg-wrap { display: flex; flex-direction: column; max-width: 72%; }
    .msg-row.mine .msg-wrap { align-items: flex-end; }

    .msg-bubble { padding: 9px 13px; font-size: 14.5px; line-height: 1.5; word-break: break-word; }
    .msg-row.theirs .msg-bubble { background: var(--elevated); border: 1px solid var(--border); border-radius: 18px 18px 18px 5px; color: var(--text); }
    .msg-row.mine   .msg-bubble { background: linear-gradient(135deg,#5b52e0,#7C6FFF); color: white; border-radius: 18px 18px 5px 18px; box-shadow: 0 3px 12px rgba(124,111,255,0.3); }

    .msg-media { max-width: 220px; width: 100%; border-radius: 12px; display: block; margin-bottom: 4px; cursor: pointer; object-fit: cover; }

    .msg-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; padding: 0 2px; justify-content: flex-end; }
    .msg-time { font-size: 10.5px; color: var(--muted); }
    .msg-ticks { display: flex; }
    .msg-ticks svg { width: 15px; height: 15px; }
    .ticks-sent { color: var(--muted); }
    .ticks-seen { color: #7dd3fc; }

    .msg-deleted { font-style: italic; color: var(--muted); font-size: 13.5px; }

    /* Input Area */
    .room-input-area { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom, 10px)); background: rgba(13,13,15,0.95); backdrop-filter: blur(16px); border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-wrap { flex: 1; background: var(--elevated); border: 1px solid var(--border); border-radius: 22px; display: flex; align-items: flex-end; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--purple); }
    textarea.room-input { flex: 1; background: none; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5; padding: 9px 12px; resize: none; outline: none; max-height: 120px; overflow-y: auto; }
    textarea.room-input::placeholder { color: var(--muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--grad); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 3px 14px rgba(124,111,255,0.4); transition: transform 0.2s, opacity 0.2s; }
    .send-btn svg { width: 18px; height: 18px; margin-left: 1px; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
    .send-btn:not(:disabled):active { transform: scale(0.93); }

    /* Toast */
    .toast { position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; transform: translateX(-50%) translateY(16px); background: var(--elevated); border: 1px solid var(--border); color: var(--text); font-size: 13.5px; font-weight: 500; padding: 10px 18px; border-radius: 100px; opacity: 0; pointer-events: none; transition: all 0.3s; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(102,187,106,0.4); color: var(--green); }
    .toast.error   { border-color: rgba(239,83,80,0.4); color: var(--red); }
  </style>
</head>
<body>

  <!-- ══ AUTH ══ -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="auth-logo"><h1>ElChat</h1><p>Encrypted. Personal. Yours.</p></div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Masuk</button>
        <button class="tab"        onclick="switchTab('register')">Daftar</button>
      </div>
      <div class="panel active" id="panel-login">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="nama@email.com" /></div>
        <div class="field"><label>Kata Sandi</label><input type="password" id="login-password" placeholder="••••••••" /></div>
        <div class="msg" id="login-msg"></div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Masuk</button>
      </div>
      <div class="panel" id="panel-register">
        <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="nama@email.com" /></div>
        <div class="field"><label>Username</label><input type="text" id="reg-username" placeholder="username17" /></div>
        <div class="field"><label>Kata Sandi (min 7 karakter + angka)</label><input type="password" id="reg-password" placeholder="••••••••" /></div>
        <div class="msg" id="reg-msg"></div>
        <button class="btn-primary" id="btn-register" onclick="doRegister()">Buat Akun</button>
      </div>
    </div>
  </div>

  <!-- ══ APP ══ -->
  <div id="app-screen" class="screen">
    <header class="app-header">
      <span class="hdr-title gradient" id="page-title">ElChat</span>
      <div class="hdr-actions">
        <div class="user-avatar" id="user-avatar"></div>
        <button class="btn-icon" onclick="doLogout()" title="Keluar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </header>
    <div class="app-content">
      <div class="page active" id="page-chat">
        <div id="chat-list-container"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
      <div class="page" id="page-calls">
        <div class="page-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18a2 2 0 012-2.18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 6.83a16 16 0 006.29 6.29l1.12-1.12a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.72 2z"/></svg>
          <h2>Panggilan</h2><p>Fitur panggilan akan segera hadir.</p>
        </div>
      </div>
      <div class="page" id="page-stories">
        <div class="page-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
          <h2>Cerita</h2><p>Bagikan momen harianmu.</p>
        </div>
      </div>
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-chat" onclick="goTo('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat
      </button>
      <button class="nav-btn" id="nav-calls" onclick="goTo('calls')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18a2 2 0 012-2.18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 6.83a16 16 0 006.29 6.29l1.12-1.12a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.72 2z"/></svg>Panggilan
      </button>
      <button class="nav-btn" id="nav-stories" onclick="goTo('stories')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>Cerita
      </button>
    </nav>
  </div>

  <!-- ══ ROOM SCREEN ══ -->
  <div id="room-screen">
    <header class="room-header">
      <button class="btn-icon" onclick="closeRoom()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="room-header__info">
        <div class="room-header__avatar" id="room-avatar"></div>
        <div>
          <div class="room-header__name"  id="room-name">—</div>
          <div class="room-header__status" id="room-status"></div>
        </div>
      </div>
    </header>

    <div class="messages-area" id="messages-area"></div>

    <div class="room-input-area">
      <div class="input-wrap">
        <textarea class="room-input" id="room-input" placeholder="Ketik pesan..." rows="1"
          oninput="onInputChange(this)" onkeydown="onInputKey(event)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script>
  var SUPABASE_URL  = 'https://sxdegbjhumiurcrfcanh.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4ZGVnYmpodW1pdXJjcmZjYW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTY1OTQsImV4cCI6MjA4OTQ5MjU5NH0.491zxrUqtwlKPFN2mXo5apduQ0lNptwrc8dXBlILTEQ';

  var db, currentUser = null, currentProfile = null;
  var activeRoom = null, msgChannel = null, presenceChannel = null;
  var typingTimer = null, isTyping = false, lastDate = null;

  /* ═══ INIT ═══ */
  window.addEventListener('load', async function() {
    try {
      if (typeof supabase === 'undefined') throw new Error('CDN gagal dimuat');
      db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      var s = await db.auth.getSession();
      if (s.data && s.data.session) { currentUser = s.data.session.user; await loadProfile(); showApp(); }
      else showAuth();
      db.auth.onAuthStateChange(async function(e, session) {
        if (e === 'SIGNED_IN' && session) { currentUser = session.user; await loadProfile(); showApp(); }
        else if (e === 'SIGNED_OUT') { currentUser = null; currentProfile = null; showAuth(); }
      });
    } catch(e) { showAuth(); showToast('Gagal terhubung: ' + e.message, 'error'); }
  });

  async function loadProfile() {
    try {
      var r = await db.from('profiles').select('*').eq('id', currentUser.id).single();
      if (r.data) { currentProfile = r.data; return; }
    } catch(e) {}
    var uname = 'user_' + currentUser.id.substring(0,6);
    try { await db.from('profiles').insert([{ id: currentUser.id, username: uname, email: currentUser.email, role: 'user' }]); } catch(e) {}
    currentProfile = { id: currentUser.id, username: uname, email: currentUser.email, role: 'user' };
  }

  /* ═══ SCREENS ═══ */
  function showAuth() {
    document.getElementById('auth-screen').classList.add('active');
    document.getElementById('app-screen').classList.remove('active');
  }
  function showApp() {
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('app-screen').classList.add('active');
    var av = document.getElementById('user-avatar');
    var init = ((currentProfile && currentProfile.username) || (currentUser && currentUser.email) || 'U').substring(0,2).toUpperCase();
    if (currentProfile && currentProfile.avatar_url) av.innerHTML = '<img src="'+currentProfile.avatar_url+'" />';
    else av.textContent = init;
    loadChatList();
  }

  /* ═══ AUTH ═══ */
  function switchTab(tab) {
    document.getElementById('panel-login').classList.toggle('active', tab==='login');
    document.getElementById('panel-register').classList.toggle('active', tab==='register');
    document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')); });
  }
  function showMsg(id, text, type) { var el=document.getElementById(id); el.textContent=text; el.className='msg '+(type||''); }

  async function doLogin() {
    var email=document.getElementById('login-email').value.trim();
    var pass=document.getElementById('login-password').value;
    if (!email||!pass) { showMsg('login-msg','Email dan kata sandi wajib diisi.','error'); return; }
    document.getElementById('btn-login').disabled=true;
    showMsg('login-msg','Memproses...','info');
    try {
      var r = await db.auth.signInWithPassword({email:email,password:pass});
      if (r.error) throw r.error;
      showMsg('login-msg','✅ Login berhasil!','success');
      currentUser = r.data.user;
      await loadProfile();
      setTimeout(function(){ showApp(); }, 500);
    } catch(e) { showMsg('login-msg','❌ '+mapErr(e.message),'error'); document.getElementById('btn-login').disabled=false; }
  }

  async function doRegister() {
    var email=document.getElementById('reg-email').value.trim();
    var uname=document.getElementById('reg-username').value.trim().toLowerCase();
    var pass=document.getElementById('reg-password').value;
    if (!email||!uname||!pass) { showMsg('reg-msg','Semua kolom wajib diisi.','error'); return; }
    if (pass.length<7) { showMsg('reg-msg','Kata sandi minimal 7 karakter.','error'); return; }
    if (!/\d/.test(pass)) { showMsg('reg-msg','Kata sandi harus mengandung angka.','error'); return; }
    document.getElementById('btn-register').disabled=true;
    showMsg('reg-msg','Membuat akun...','info');
    try {
      var r = await db.auth.signUp({email:email,password:pass,options:{data:{username:uname}}});
      if (r.error) throw r.error;
      try { await db.from('profiles').insert([{id:r.data.user.id,username:uname,email:email,role:'user'}]); } catch(e) {}
      showMsg('reg-msg','✅ Akun berhasil dibuat! Silakan login.','success');
      setTimeout(function(){ switchTab('login'); document.getElementById('login-email').value=email; document.getElementById('btn-register').disabled=false; showMsg('reg-msg','',''); },2000);
    } catch(e) { showMsg('reg-msg','❌ '+mapErr(e.message),'error'); document.getElementById('btn-register').disabled=false; }
  }

  async function doLogout() { await db.auth.signOut(); showToast('Berhasil keluar.','success'); }

  /* ═══ NAV ═══ */
  function goTo(page) {
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    document.getElementById('page-'+page).classList.add('active');
    document.getElementById('nav-'+page).classList.add('active');
    var el=document.getElementById('page-title');
    if (page==='chat') { el.textContent='ElChat'; el.className='hdr-title gradient'; }
    else { el.textContent={calls:'Panggilan',stories:'Cerita'}[page]||page; el.className='hdr-title'; }
  }

  /* ═══ CHAT LIST ═══ */
  async function loadChatList() {
    var c=document.getElementById('chat-list-container');
    c.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
    try {
      // Query 1: Global rooms
      var gr = await db.from('rooms')
        .select('id,name,last_message,last_message_at')
        .eq('is_global', true)
        .limit(1)
        .maybeSingle();

      // Query 2: User's room memberships (simple, no nested ordering)
      var mr = await db.from('room_members')
        .select('room_id')
        .eq('user_id', currentUser.id);

      var html = '';
      var globalIds = [];

      // Render global room
      if (gr.data) {
        globalIds.push(gr.data.id);
        html += '<div class="section-label">Global</div>';
        html += chatItem(gr.data, 'global', 'GG', true);
      }

      // Query 3: Get full room data for user's rooms
      var roomIds = (mr.data||[]).map(function(m){ return m.room_id; })
        .filter(function(id){ return globalIds.indexOf(id) === -1; });

      if (roomIds.length > 0) {
        var rr = await db.from('rooms')
          .select('id,name,last_message,last_message_at,is_global')
          .in('id', roomIds)
          .eq('is_global', false)
          .order('last_message_at', {ascending: false, nullsFirst: false});

        var rooms = rr.data || [];
        if (rooms.length > 0) {
          html += '<div class="section-label">Percakapan</div>';
          var gs = ['g1','g2','g3'];
          rooms.forEach(function(r, i){
            html += chatItem(r, gs[i%3], (r.name||'R').substring(0,2).toUpperCase(), false);
          });
        }
      }

      if (!gr.data && roomIds.length === 0) {
        html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><h3>Belum ada percakapan</h3><p>Room chat akan muncul di sini setelah permintaan chat diterima.</p></div>';
      }

      c.innerHTML = '<div>' + html + '</div>';
    } catch(e) {
      c.innerHTML = '<div class="empty-state"><h3>Gagal memuat</h3><p>' + esc(e.message) + '</p></div>';
    }
  }

  function chatItem(r, cls, initials, isGlobal) {
    return '<div class="chat-item" onclick="openRoom(\''+r.id+'\',\''+esc(r.name||'Chat')+'\')">' +
      '<div class="chat-avatar '+cls+'">'+initials+'</div>' +
      '<div class="chat-info"><div class="chat-name">'+esc(r.name||'Chat')+'</div>' +
      '<div class="chat-last">'+esc(r.last_message||'Belum ada pesan')+'</div></div>' +
      '<div class="chat-meta"><div class="chat-time">'+fmtTime(r.last_message_at)+'</div>' +
      (isGlobal?'<div class="global-pill">Global</div>':'')+'</div></div>';
  }

  /* ═══ OPEN ROOM ═══ */
  async function openRoom(roomId, roomName) {
    activeRoom = { id: roomId, name: roomName };
    lastDate = null;

    // Set header
    document.getElementById('room-name').textContent = roomName;
    document.getElementById('room-status').textContent = '';
    document.getElementById('room-status').className = 'room-header__status';
    var av = document.getElementById('room-avatar');
    av.textContent = roomName.substring(0,2).toUpperCase();

    // Clear messages
    var area = document.getElementById('messages-area');
    area.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

    // Open room screen
    var rs = document.getElementById('room-screen');
    rs.style.display='flex'; 
    requestAnimationFrame(function(){ rs.classList.add('open'); });
    document.body.style.overflow='hidden';

    // Reset input
    var inp=document.getElementById('room-input');
    inp.value=''; inp.style.height='auto';
    document.getElementById('send-btn').disabled=true;

    // Load messages
    await loadMessages(roomId);
    subscribeMessages(roomId);
    subscribePresence(roomId);
  }

  function closeRoom() {
    var rs = document.getElementById('room-screen');
    rs.classList.remove('open');
    setTimeout(function(){ rs.style.display='none'; document.body.style.overflow=''; },300);
    if (msgChannel) { db.removeChannel(msgChannel); msgChannel=null; }
    if (presenceChannel) { db.removeChannel(presenceChannel); presenceChannel=null; }
    activeRoom = null;
    loadChatList(); // Refresh list
  }

  /* ═══ LOAD MESSAGES ═══ */
  async function loadMessages(roomId) {
    var area = document.getElementById('messages-area');
    try {
      var r = await db.from('messages')
        .select('id,sender_id,content,media_url,media_type,deleted_by,created_at')
        .eq('room_id', roomId)
        .order('created_at', {ascending:true})
        .limit(50);
      if (r.error) throw r.error;
      area.innerHTML='';
      lastDate=null;
      (r.data||[]).forEach(function(msg){ appendMsg(msg); });
      scrollBottom(true);
    } catch(e) {
      area.innerHTML='<div class="empty-state"><h3>Gagal memuat pesan</h3><p>'+esc(e.message)+'</p></div>';
    }
  }

  /* ═══ APPEND MESSAGE ═══ */
  function appendMsg(msg) {
    var myId = currentUser.id;
    // Skip deleted
    if (Array.isArray(msg.deleted_by) && msg.deleted_by.indexOf(myId)>=0) return;

    var area = document.getElementById('messages-area');
    var isMine = msg.sender_id === myId;

    // Date separator
    var d = new Date(msg.created_at).toDateString();
    if (d !== lastDate) {
      lastDate = d;
      var sep = document.createElement('div');
      sep.className='date-sep';
      sep.innerHTML='<span>'+fmtDate(msg.created_at)+'</span>';
      area.appendChild(sep);
    }

    var row = document.createElement('div');
    row.className='msg-row '+(isMine?'mine':'theirs');
    row.dataset.id=msg.id;

    var avatarHtml='';
    if (!isMine) {
      avatarHtml='<div class="msg-av">'+((currentProfile&&currentProfile.username)||'U').substring(0,2).toUpperCase()+'</div>';
    }

    var bubbleContent='';
    if (msg.deleted_by && msg.deleted_by.length>0 && msg.deleted_by.indexOf(myId)<0 && !isMine) {
      bubbleContent='<span class="msg-deleted">Pesan telah dihapus</span>';
    } else {
      if (msg.media_url) {
        var tag = msg.media_type==='video'?'video':'img';
        bubbleContent+='<'+tag+' class="msg-media" src="'+esc(msg.media_url)+'" '+(tag==='video'?'controls':'')+' loading="lazy"></'+tag+'>';
      }
      if (msg.content) bubbleContent+=esc(msg.content);
    }

    var ticksHtml='';
    if (isMine) ticksHtml='<span class="msg-ticks ticks-sent" id="ticks-'+msg.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>';

    row.innerHTML=(isMine?'':''+avatarHtml)+
      '<div class="msg-wrap">'+
        '<div class="msg-bubble">'+bubbleContent+'</div>'+
        '<div class="msg-meta">'+
          '<span class="msg-time">'+fmtMsgTime(msg.created_at)+'</span>'+
          ticksHtml+
        '</div>'+
      '</div>'+
      (isMine?'':'');

    area.appendChild(row);
  }

  /* ═══ REALTIME MESSAGES ═══ */
  function subscribeMessages(roomId) {
    if (msgChannel) db.removeChannel(msgChannel);
    msgChannel = db.channel('msgs-'+roomId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room_id=eq.'+roomId},function(p){
        var existing=document.querySelector('[data-id="'+p.new.id+'"]');
        if (existing) existing.remove();
        appendMsg(p.new);
        scrollBottom();
      })
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages',filter:'room_id=eq.'+roomId},function(p){
        var el=document.querySelector('[data-id="'+p.old.id+'"]');
        if (el) { el.style.opacity='0'; el.style.transform='scale(0.9)'; el.style.transition='all 0.25s'; setTimeout(function(){ el.remove(); },250); }
      })
      .subscribe();
  }

  /* ═══ PRESENCE (Mengetik / Online) ═══ */
  function subscribePresence(roomId) {
    if (presenceChannel) db.removeChannel(presenceChannel);
    var myId=currentUser.id;
    presenceChannel = db.channel('presence-'+roomId, {config:{presence:{key:myId}}});
    presenceChannel
      .on('presence',{event:'sync'},function(){
        var state=presenceChannel.presenceState();
        var others=Object.keys(state).filter(function(k){return k!==myId;});
        var statusEl=document.getElementById('room-status');
        if (others.length>0) {
          var otherState=state[others[0]][0]||{};
          if (otherState.typing) { statusEl.textContent='Mengetik...'; statusEl.className='room-header__status typing'; }
          else { statusEl.textContent='Online'; statusEl.className='room-header__status online'; }
          // Update ticks to seen
          document.querySelectorAll('.ticks-sent').forEach(function(t){
            t.className='msg-ticks ticks-seen';
            t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="17 6 9 17 4 12"/><polyline points="23 6 15 17 13 15"/></svg>';
          });
        } else { statusEl.textContent=''; statusEl.className='room-header__status'; }
      })
      .on('presence',{event:'leave'},function(){
        var statusEl=document.getElementById('room-status');
        statusEl.textContent=''; statusEl.className='room-header__status';
      })
      .subscribe(async function(status){
        if (status==='SUBSCRIBED') {
          await presenceChannel.track({userId:myId,inRoom:true,typing:false});
        }
      });
  }

  function broadcastTyping(val) {
    if (!presenceChannel) return;
    clearTimeout(typingTimer);
    if (val && !isTyping) { isTyping=true; presenceChannel.track({userId:currentUser.id,inRoom:true,typing:true}); }
    if (val) { typingTimer=setTimeout(function(){ isTyping=false; presenceChannel.track({userId:currentUser.id,inRoom:true,typing:false}); },2000); }
    else if (!val&&isTyping) { isTyping=false; presenceChannel.track({userId:currentUser.id,inRoom:true,typing:false}); }
  }

  /* ═══ INPUT ═══ */
  function onInputChange(el) {
    el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,120)+'px';
    document.getElementById('send-btn').disabled=el.value.trim().length===0;
    broadcastTyping(el.value.length>0);
  }
  function onInputKey(e) {
    if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMsg(); }
  }

  /* ═══ SEND MESSAGE ═══ */
  async function sendMsg() {
    var inp=document.getElementById('room-input');
    var content=inp.value.trim();
    if (!content||!activeRoom) return;

    inp.value=''; inp.style.height='auto';
    document.getElementById('send-btn').disabled=true;
    broadcastTyping(false);

    // Optimistic bubble
    var tempId='temp-'+Date.now();
    appendMsg({id:tempId,sender_id:currentUser.id,content:content,deleted_by:[],created_at:new Date().toISOString()});
    scrollBottom();

    try {
      var r = await db.from('messages').insert([{
        room_id: activeRoom.id,
        sender_id: currentUser.id,
        content: content,
        deleted_by: []
      }]).select('id').single();

      if (r.error) throw r.error;

      // Replace temp bubble id
      var tempEl=document.querySelector('[data-id="'+tempId+'"]');
      if (tempEl) tempEl.dataset.id=r.data.id;

      // Update last_message on room
      await db.from('rooms').update({last_message:content,last_message_at:new Date().toISOString()}).eq('id',activeRoom.id);

    } catch(e) {
      var tempEl=document.querySelector('[data-id="'+tempId+'"]');
      if (tempEl) { tempEl.style.opacity='0.4'; tempEl.title='Gagal terkirim'; }
      showToast('Gagal mengirim pesan.','error');
    }
  }

  /* ═══ UTILS ═══ */
  function scrollBottom(instant) {
    var area=document.getElementById('messages-area');
    if (!area) return;
    if (instant) area.scrollTop=area.scrollHeight;
    else requestAnimationFrame(function(){ area.scrollTop=area.scrollHeight; });
  }
  function fmtMsgTime(iso) { return new Date(iso).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
  function fmtDate(iso) {
    var d=new Date(iso),now=new Date();
    if (d.toDateString()===now.toDateString()) return 'Hari Ini';
    var y=new Date(now); y.setDate(now.getDate()-1);
    if (d.toDateString()===y.toDateString()) return 'Kemarin';
    return d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'});
  }
  function fmtTime(iso) {
    if (!iso) return '';
    var d=new Date(iso),now=new Date(),diff=(now-d)/1000;
    if (diff<60) return 'Baru';
    if (diff<3600) return Math.floor(diff/60)+' mnt';
    if (d.toDateString()===now.toDateString()) return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('id-ID',{day:'numeric',month:'numeric'});
  }
  function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function mapErr(m) {
    if (!m) return 'Terjadi kesalahan.';
    var l=m.toLowerCase();
    if (l.includes('invalid login')||l.includes('invalid email')) return 'Email atau kata sandi tidak sesuai.';
    if (l.includes('email not confirmed')) return 'Email belum diverifikasi.';
    if (l.includes('already registered')||l.includes('already been registered')) return 'Email sudah terdaftar. Silakan login.';
    if (l.includes('rate limit')) return 'Terlalu banyak percobaan. Tunggu sebentar.';
    return m;
  }
  function showToast(msg,type) {
    var t=document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+(type||'');
    clearTimeout(window._tt);
    window._tt=setTimeout(function(){ t.className='toast'; },3000);
  }
  </script>
</body>
</html>
